<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Asystent zamówień AI</title>

  <style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 0;
}

  .chat-container {
  width: 90%;
  max-width: 780px;
  height: 100dvh;
  max-height: 900px;
  margin: auto;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

    .chat-container::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.85);
      z-index: 0;
    }

    .header {
      background: #111;
      color: white;
      padding: 16px;
      font-weight: bold;
      position: relative;
      z-index: 1;
    }

    .messages {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      max-width: 90%;
      line-height: 1.5;
      font-size: 15px;
    }

    .user {
      align-self: flex-end;
      background: #007bff;
      color: white;
    }

    .bot {
      align-self: flex-start;
      background: #eee;
    }

    .bot strong {
      display: block;
      margin-bottom: 4px;
    }

    .product-card {
      background: white;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      max-width: 100%;
    }

    .product-card img {
      width: 40%;
      border-radius: 10px;
      margin-bottom: 6px;
    }

    .product-card-title {
      font-weight: bold;
      font-size: 13px;
    }

    .product-card-price {
      font-size: 13px;
      color: #555;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #ddd;
      position: relative;
      z-index: 1;
      font-size: 16px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      background: #111;
      color: white;
      border: none;
      padding: 0 16px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    .typing {
      font-style: italic;
      font-size: 12px;
      color: #888;
    }

    img.chat-image {
      width: 80%;
      border-radius: 12px;
      margin-top: 8px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      border-radius: 0;
    }

    @media (max-width: 768px) {
  .chat-container {
    width: 100vw;
    height: 100dvh;
    max-width: none;
    max-height: none;

    border-radius: 0;
    box-shadow: none;
  }
}
  </style>
</head>

<body>

<div class="chat-container">
  <div class="header">🛍️ Asystent zamówień</div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="input" placeholder="Np. HY12345604 lub zapytaj o inspiracje..." />
    <button onclick="send()">➤</button>
  </div>
</div>

<script>
  const messagesDiv = document.getElementById("messages");

  addMessage("Cześć! Podaj numer zamówienia albo zapytaj o inspiracje 🙂", "bot");

  function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "bubble " + type;
    div.innerHTML = text;

    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function addImage(url) {
    const img = document.createElement("img");
    img.src = url;
    img.className = "chat-image";

    messagesDiv.appendChild(img);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  // 🛒 render produktu
  function addProductCard(product) {
    const div = document.createElement("div");
    div.className = "product-card";

    div.innerHTML = `
      <img src="images/${product.image}" />
      <div class="product-card-title">${product.name}</div>
      <div class="product-card-price">${product.price} zł</div>
    `;

    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typing";
    div.innerText = "Bot pisze...";
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    showTyping();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();

      removeTyping();

      // 💬 tekst
      addMessage(data.reply, "bot");

      // 🎨 obraz
      if (data.image) {
        addImage(data.image);
      }

      // 🛒 produkty
      if (data.products && data.products.length > 0) {
        data.products.forEach(p => addProductCard(p));
      }

    } catch (err) {
      removeTyping();
      addMessage("Błąd połączenia z serwerem", "bot");
    }
  }

  document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") send();
  });
</script>

</body>
</html>
